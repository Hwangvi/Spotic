spring.application.name=backSpotic

spotify.client-id=${SPOTIFY_CLIENT_ID:TU_CLIENT_ID_DE_SPOTIFY}
spotify.client-secret=${SPOTIFY_CLIENT_SECRET:TU_CLIENT_SECRET_DE_SPOTIFY}
spotify.redirect-uri=${SPOTIFY_REDIRECT_URI:http://localhost:8080/api/auth/callback}
server.port=${SERVER_PORT:8080}

# server.ssl.key-store-type=PKCS12
# server.ssl.key-store=classpath:keystore.p12
# server.ssl.key-store-password=password
# server.ssl.key-alias=tomcat

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}
app.frontend.url=${FRONTEND_URL:http://localhost:4200}

spring.datasource.url=jdbc:h2:mem:mi-proyecto-db
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driverClassName=org.h2.Driver

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

logging.level.org.springframework.security=INFO